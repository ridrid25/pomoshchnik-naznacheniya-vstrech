name: meeting-assistant

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: meeting-assistant-app:local
    restart: unless-stopped
    init: true
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: file:/app/data/app.db
      TELEGRAM_DEV_POLLING: "false"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    ports:
      - "127.0.0.1:${APP_BIND_PORT:-3020}:3000"
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s

  caddy:
    image: caddy:2.11.4-alpine
    profiles:
      - bundled-proxy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env.production}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true

volumes:
  caddy_data:
  caddy_config:
